<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的待办事项 - Todo List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- 佐衬栏 -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">📝 我的待办事项</h1>
                <p class="subtitle">高效事项管理器</p>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">程宝</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">已完成</span>
                    <span class="stat-value completed" id="completedTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">待停办</span>
                    <span class="stat-value pending" id="pendingTasks">0</span>
                </div>
            </div>
        </header>

        <!-- 主面板 -->
        <main class="main">
            <!-- 添加任务区域 -->
            <div class="add-task-section">
                <div class="input-group">
                    <input type="text" id="taskInput" class="task-input" placeholder="添加新的任务...">
                    <select id="prioritySelect" class="priority-select">
                        <option value="low">低</option>
                        <option value="medium" selected>中</option>
                        <option value="high">高</option>
                    </select>
                    <button id="addBtn" class="add-btn">添加</button>
                </div>
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="pending">待办</button>
                    <button class="filter-btn" data-filter="completed">已完成</button>
                    <button class="filter-btn" data-filter="high">高优先级</button>
                </div>
            </div>

            <!-- 任务列表 -->
            <div class="task-container">
                <div id="taskList" class="task-list">
                    <!-- 任务会镶嵌到这里 -->
                </div>
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">😊</div>
                    <p>你没有任务，休息一下吧！</p>
                </div>
            </div>
        </main>

        <!-- 操作栏 -->
        <footer class="footer">
            <button id="clearCompletedBtn" class="action-btn danger" title="清除已完成的任务">🗑️ 清除已完成</button>
            <span class="storage-info" id="storageInfo">数据已保存</span>
            <button id="exportBtn" class="action-btn" title="导出任务列表">📥 导出</button>
        </footer>
    </div>

    <!-- 任务编辑模态 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>编辑任务</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="editInput" class="edit-input" placeholder="任务描述">
                <select id="editPriority" class="priority-select">
                    <option value="low">低优先级</option>
                    <option value="medium">中优先级</option>
                    <option value="high">高优先级</option>
                </select>
                <input type="date" id="editDate" class="date-input">
            </div>
            <div class="modal-footer">
                <button id="cancelBtn" class="action-btn secondary">取消</button>
                <button id="saveBtn" class="action-btn primary">保存</button>
            </div>
        </div>
    </div>

    <!-- 提示信息 -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
